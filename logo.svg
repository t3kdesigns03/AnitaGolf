<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Crestwood Hills Golf Course">
  <title>Crestwood Hills Golf Course</title>
  <defs>
    <clipPath id="lc-standalone">
      <circle cx="50" cy="50" r="43"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="49" fill="#1e5631"/>
  <!-- Outer gold ring -->
  <circle cx="50" cy="50" r="48.5" fill="none" stroke="#c8961e" stroke-width="2.5"/>
  <!-- Inner decorative ring -->
  <circle cx="50" cy="50" r="43.5" fill="none" stroke="#c8961e" stroke-width="0.9" opacity="0.55"/>

  <!-- Top horizontal banner line -->
  <line x1="17" y1="29" x2="83" y2="29" stroke="#c8961e" stroke-width="0.7" opacity="0.55" clip-path="url(#lc-standalone)"/>

  <!-- Night sky stars -->
  <circle cx="37" cy="21" r="0.9" fill="white" opacity="0.5" clip-path="url(#lc-standalone)"/>
  <circle cx="54" cy="18" r="0.9" fill="white" opacity="0.5" clip-path="url(#lc-standalone)"/>
  <circle cx="64" cy="22" r="0.6" fill="white" opacity="0.35" clip-path="url(#lc-standalone)"/>
  <circle cx="43" cy="25" r="0.5" fill="white" opacity="0.3" clip-path="url(#lc-standalone)"/>

  <!-- Back rolling hills (Lake Anita State Park) -->
  <path d="M7 70 Q20 46 34 58 Q48 70 63 42 Q73 26 93 50 L93 100 L7 100 Z"
        fill="#285f3a" clip-path="url(#lc-standalone)"/>

  <!-- Mid hills -->
  <path d="M7 83 Q24 64 42 75 Q58 85 76 63 Q84 55 93 65 L93 100 L7 100 Z"
        fill="#1d5230" clip-path="url(#lc-standalone)"/>

  <!-- Foreground / ground -->
  <path d="M7 91 Q30 86 50 89 Q70 92 93 87 L93 100 L7 100 Z"
        fill="#163d24" clip-path="url(#lc-standalone)"/>

  <!-- Lake Anita water reflection -->
  <ellipse cx="32" cy="90" rx="18" ry="3.5" fill="#1e4060" opacity="0.55" clip-path="url(#lc-standalone)"/>

  <!-- Pine tree cluster (left — representing tree-lined fairways) -->
  <polygon points="19,84 25,64 31,84" fill="#112818" clip-path="url(#lc-standalone)"/>
  <polygon points="20,76 25,59 30,76" fill="#163520" clip-path="url(#lc-standalone)"/>
  <polygon points="21,68 25,55 29,68" fill="#1d4228" clip-path="url(#lc-standalone)"/>
  <rect x="23" y="84" width="4" height="5" fill="#0d1e12" clip-path="url(#lc-standalone)"/>

  <polygon points="29,84 34,68 39,84" fill="#112818" clip-path="url(#lc-standalone)"/>
  <polygon points="30,77 34,64 38,77" fill="#163520" clip-path="url(#lc-standalone)"/>
  <rect x="32" y="84" width="4" height="4" fill="#0d1e12" clip-path="url(#lc-standalone)"/>

  <!-- Golf flag (right hill — the course's signature element) -->
  <line x1="74" y1="36" x2="74" y2="64" stroke="#f0c040" stroke-width="1.9" clip-path="url(#lc-standalone)"/>
  <path d="M74 36 Q81 40 87 37 Q81 44 74 47 Z" fill="#f0c040" clip-path="url(#lc-standalone)"/>
  <!-- Hole marker -->
  <circle cx="74" cy="64" r="2.6" fill="#c8961e" clip-path="url(#lc-standalone)"/>

  <!-- Bottom divider line -->
  <line x1="18" y1="87" x2="82" y2="87" stroke="#c8961e" stroke-width="0.6" opacity="0.45" clip-path="url(#lc-standalone)"/>

  <!-- Location text -->
  <text x="50" y="95.5" text-anchor="middle"
        font-family="Inter, system-ui, Arial, sans-serif"
        font-size="6.2" fill="#f0c040" opacity="0.9"
        letter-spacing="1.5" font-weight="600"
        clip-path="url(#lc-standalone)">ANITA · IOWA</text>
</svg>
